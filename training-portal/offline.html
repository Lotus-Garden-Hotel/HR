<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a5c2a">
<title>Offline - Training Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0d3318;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:24px;text-align:center}
.logo{width:100px;height:100px;background:#c9a227;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:48px;margin:0 auto 24px;box-shadow:0 8px 32px rgba(201,162,39,.4)}
h1{font-size:24px;font-weight:700;margin-bottom:8px;color:#f0d060}
p{font-size:14px;color:rgba(255,255,255,.65);line-height:1.6;margin-bottom:24px}
.btn{background:#c9a227;color:#0d3318;border:none;border-radius:30px;padding:14px 32px;font-size:15px;font-weight:700;cursor:pointer}
.btn:active{transform:scale(.97)}
.status{margin-top:20px;font-size:12px;color:rgba(255,255,255,.35)}
</style>
</head>
<body>
  <div class="logo">🌸</div>
  <h1>Tidak Ada Koneksi</h1>
  <p>Anda sedang offline.<br>Hubungkan ke internet untuk mengakses<br><strong style="color:#f0d060">Training Portal Lotus Garden</strong></p>
  <button class="btn" onclick="tryReload()">🔄 Coba Lagi</button>
  <div class="status">Training Portal v3.1 · Waringin Hospitality</div>
<script>
function tryReload(){
  if(navigator.onLine){window.location.href='/training-portal/training.html';}
  else{document.querySelector('p').innerHTML='Masih offline.<br>Pastikan koneksi internet aktif.';}
}
window.addEventListener('online',()=>{ window.location.href='/training-portal/training.html'; });
</script>
</body>
</html>
